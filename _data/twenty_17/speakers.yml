- title: Ms. Sissi De la Peña
  oneliner: Director & Founder, The Dot Network; Mexico Chapter Director, GASA Mexico
  bio: >
    Ms. Sissi De la Peña brings over 20 years of international experience across Latin America, Mexico, the United States, and the United Kingdom, with more than a decade specializing in government affairs and digital policy. She drives innovation at the intersection of AI governance, cybersecurity, and digital transformation, orchestrating public-private partnerships that address privacy, fraud and emerging technology risks across infrastructure, telecommunications, and digital regulatory frameworks. As a recognized expert in public policy, she has led regulatory negotiations on digital trade chapters in major trade agreements, including T-MEC and the EU-Mexico accord, and represented Mexico in international forums such as the OECD, G20, and the UN Internet Governance Forum. Her expertise in AI governance is evidenced by her leadership of Mexico's AI Regulatory Sandbox and her founding role in the National AI Alliance (ANIA). Currently, she serves as Director of Mexico's chapter of the Global Anti-Scam Alliance and Founder of The Dot Network. Recognized as a Women in AI Responsible Leader in 2025, she holds credentials including the UC Berkeley Tech Policy Fellowship and Google WomenCISO LATAM certification. 
  image: /css/2016_style/img/sissi-delapeña.jpg

- title: Ms. Calista Redmond
  oneliner: Vice President of Global AI Initiatives, NVIDIA
  bio: >
    Ms. Calista Redmond is the Vice President of Global AI Initiatives at NVIDIA, where she leads strategic collaborations with regions, ecosystem partners, and product groups to advance Sovereign AI and national AI programs worldwide. Her work focuses on helping nations build digital resilience, local innovation capacity, and AI ecosystems aligned with their cultural and economic priorities. 
  image: /css/2016_style/img/calista-redmond.jpg

- title: Mr. Robb Tanner
  oneliner: Deputy Assistant for ICT Services & Digital Trade, Office of the U.S. Trade Representative (USTR)
  bio: >
    Robb Tanner is the Deputy Assistant USTR for ICT Services and Digital Trade at the Office of the United States Trade Representative (USTR) where he leads the development of digital trade policy. Prior to joining USTR, he served as a Special Counsel in the International Bureau of the U.S. Federal Communications Commission (FCC). He received his J.D. from the University of California, Hastings College of the Law and B.A. from California Polytechnic State University.
