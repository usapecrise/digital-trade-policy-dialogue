- title: Mr. Kok Ping Soon
  oneliner: Chief Executive Officer, Singapore Business Federation
  bio: >
    Mr. Kok Ping Soon is Chief Executive Officer of the Singapore Business Federation (SBF), the apex business chamber championing the interests of Singapore’s business community in trade, investment and industrial relations matters. SBF represents more than 32,000 companies, as well as key local and foreign business chambers. Prior to his current appointment, Ping Soon was Chief Executive of the Government Technology Agency of Singapore (GovTech), the lead agency driving Singapore’s Smart Nation initiative and public sector digital transformation.
  image: /css/2016_style/img/kok-ping-soon.jpg

- title: Dr. Peter Lovelock
  oneliner: Principal, Fair Tech Institute, Access Partnership
  bio: >
    Dr. Peter Lovelock is the Chief Consulting & Innovation Officer at Access Partnership. He brings more than 30 years’ experience advising governments and global firms on digital economy strategy, digital trade, and AI programs.

- title: Mr. Juan Carlos Pardo
  oneliner: Country Manager México, Dapper
  bio: >
    Mr. Juan Carlos Pardo is a senior executive in public affairs, corporate strategy, and sustainability, with over 25 years of experience leading institutional positioning and stakeholder management in Mexico. Since October 2025, he has led Dapper's operations in Mexico as Country Manager.
