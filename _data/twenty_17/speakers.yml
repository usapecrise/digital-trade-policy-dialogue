- title: Dr. Ted Chang
  oneliner: Chief Technology Officer, Vice President, and General Manager, Quanta Computer
  bio: >
  Dr. Ted Chang is Chief Technology Officer, Vice President, and General Manager of Quanta Computer, a Fortune 500 company. He leads Quanta’s technology strategy, guiding the Quanta Research Institute (QRI) and Business Unit 12 (BU12) to pioneer breakthroughs in AI, IoT, and cloud platforms that are transforming healthcare, medicine, agriculture, and art. He is a guest professor at Taiwan University, Cheng Kung University, Yang Ming Chiao Tung University and Asia University, serves on advisory boards including the MIT Jameel Clinic for Machine Learning in Health, and is a Board Member of the Epoch Foundation. An inventor with more than 285 patents, including a seminal 2001 patent that anticipated the modern “Application Module Store,” Dr. Chang has earned recognition with the IEEE Communications Society Robert M. Walp Industry Humanitarian Award (2024), the MIT CSAIL Visionary Partner Award (2024), Japan Good Design Best 100 (2022), six Red Dot Awards, and iF Design Award (2021). For two decades, he has led Quanta's collaboration with MIT CSAIL, advancing research from human-centric computing to AI medicine.

