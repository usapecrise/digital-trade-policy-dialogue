- title: Mr. Kok Ping Soon
  oneliner: Chief Executive Officer, Singapore Business Federation
  bio: >
    Mr. Kok Ping Soon is Chief Executive Officer of the Singapore Business Federation (SBF), the apex business chamber championing the interests of Singapore’s business community in trade, investment and industrial relations matters. SBF represents more than 32,000 companies, as well as key local and foreign business chambers. Prior to his current appointment, Ping Soon was Chief Executive of the Government Technology Agency of Singapore (GovTech), the lead agency driving Singapore’s Smart Nation initiative and public sector digital transformation. He also held various positions in the Ministry of Manpower, National Security Co-ordination Secretariat, Ministry of Trade & Industry, Singapore Tourism Board, Contact Singapore (CS), and Economic Development Board (EDB). He spent six years in the United States working for CS and EDB. He serves on the Board of SBF Holdings, SBF Connect, Singapore Business Federation Foundation, Accounting and Corporate Regulatory Authority, Global Compact Network Singapore, Singapore Pools and The Intellectual Property Office of Singapore. He is also a member of Singapore International Arbitration Centre, Singapore International Mediation Centre, NUS Institute of Systems Sciences, National Integration Council and a fellow member of Singapore Computer Society. 
  image_class: img-top

- title: Dr. Peter Lovelock
  oneliner: Principal, Fair Tech Institute, Access Partnership
  bio: >
    Dr. Peter Lovelock is the Chief Consulting & Innovation Officer at Access Partnership. In this role Peter is responsible for all consulting and client delivery across AP’s global footprint, and oversees the group’s solutions development. Prior to its acquisition by Access Partnership, Peter was the Director and Co-founder of TRPC Pte Ltd. He brings more than 30 years’ experience in digital technology and infrastructure developments to these undertakings. Peter has worked as an advisor to most of the world’s leading digital companies, as well as to many governments as they have developed their digital economy or digital trade plans and, more recently their AI programs. He has provided expert recommendations to ASEAN on its Digital Masterplan, to APEC on its Digital Economy roadmap and principles, to the US Government on regional digital economy strategies, as well as to governments throughout the Asia and Pacific regions on their digital transformation programs. He has developed a widely cited typology of data localization approaches and a detailed comparative analysis of the various digital trade agreements. 

- title: Mr. Juan Carlos Pardo
  oneliner: Country Manager México, Dapper
  bio: >
    Mr. Juan Carlos Pardo is a senior executive in public affairs, corporate strategy, and sustainability, with over 25 years of experience leading institutional positioning and stakeholder management in Mexico. Throughout his career, he has specialized in advising senior management on strategic decision-making, particularly in complex regulatory environments and situations with high reputational exposure. Since October 2025, he has led Dapper's operations in Mexico as Country Manager, driving the adoption of regulatory intelligence solutions to transform how organizations understand, anticipate, and respond to the public environment. Throughout his career, he has held leadership positions in business and civil society organizations, including his participation as a board member in initiatives such as the UN Global Compact in Mexico, the Mexican Business Council for Foreign Trade (COMCE), and various sectoral associations. He also served as president of the National Chamber of Dairy Industrialists for three years. For 20 years, he served as Director of Corporate Affairs and ESG at Nestlé Mexico, where he was responsible for strengthening corporate reputation, ensuring business continuity, and leading the company's sustainability agenda in the country. His management was distinguished by consolidating key relationships with public, private, and social sector stakeholders, as well as by integrating ESG criteria into the business strategy. In 2024, he founded AXS México, a boutique consulting firm focused on strategy, public affairs, and relationship management, where he has advised companies on navigating regulatory risks and building institutional positioning. Juan Carlos holds an Honorary Doctorate from AISOL and a Bachelor's degree in Business Administration from Tecnológico de Monterrey. 

