- title: Dr. Ted Chang
  oneliner: Leads global AI and cloud innovation with 285+ patents and decades of collaboration with MIT.
  bio: >
    Dr. Ted Chang is Chief Technology Officer, Vice President, and General Manager of Quanta Computer, a Fortune 500 company. He leads Quanta’s technology strategy, guiding the Quanta Research Institute (QRI) and Business Unit 12 (BU12) to pioneer breakthroughs in AI, IoT, and cloud platforms transforming healthcare, medicine, agriculture, and art. He is a guest professor at multiple leading universities and serves on advisory boards including the MIT Jameel Clinic for Machine Learning in Health. An inventor with more than 285 patents, he has received numerous global awards for innovation and design. For two decades, he has led Quanta's collaboration with MIT CSAIL, advancing research from human-centric computing to AI medicine. 

- title: Kok Ping Soon
  oneliner: CEO of Singapore Business Federation, representing 32,000+ companies and former GovTech leader.
  bio: >
    Mr. Kok Ping Soon is Chief Executive Officer of the Singapore Business Federation (SBF), representing more than 32,000 companies. SBF serves as the apex business chamber championing trade, investment, and industrial relations. Prior to this role, he served as Chief Executive of GovTech, leading Singapore’s Smart Nation initiative and public sector digital transformation. He has held senior roles across multiple government agencies and serves on numerous boards and councils supporting business, governance, and innovation.

- title: Peter Lovelock
  oneliner: Advisor to governments and global firms on digital trade, AI, and infrastructure for over 30 years.
  bio: >
    Peter Lovelock is Chief Consulting & Innovation Officer at Access Partnership, where he oversees global consulting and client delivery. With more than 30 years of experience, he has advised leading technology companies and governments on digital economy strategies, digital trade, and AI programs. He has contributed to major initiatives including ASEAN’s Digital Masterplan and APEC’s digital economy frameworks, and has developed widely cited research on data localization and digital trade agreements.

- title: Juan Carlos Pardo
  oneliner: Public affairs and ESG leader specializing in regulatory strategy and stakeholder engagement in Mexico.
  bio: >
    Juan Carlos Pardo is a senior executive in public affairs, corporate strategy, and sustainability with over 25 years of experience in Mexico. He specializes in advising leadership in complex regulatory and high-reputation environments. He currently serves as Country Manager of Dapper Mexico. Previously, he spent 20 years at Nestlé Mexico as Director of Corporate Affairs and ESG, and has held leadership roles across business and civil society organizations. He also founded AXS México, a consulting firm focused on strategy and institutional positioning.

- title: Calista Redmond
  oneliner: Leads global AI partnerships at NVIDIA, advancing sovereign AI and national AI ecosystems.
  bio: >
    Calista Redmond is Vice President of Global AI Initiatives at NVIDIA. She leads strategic collaborations with governments, ecosystem partners, and industry to advance Sovereign AI and national AI programs. Her work focuses on helping countries build digital resilience, strengthen local innovation capacity, and develop AI ecosystems aligned with their economic and cultural priorities.
