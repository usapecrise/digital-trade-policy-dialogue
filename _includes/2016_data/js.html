<!-- Bootstrap Core JavaScript -->
<script src="{{ "../css/2016_style/js/bootstrap.min.js" | prepend: site.baseurl }}"></script>

<!-- Plugin JavaScript -->
<script src="{{ "../css/2016_style/js/jquery.easing.min.js" | prepend: site.baseurl }}"></script>
<script src="{{ "../css/2016_style/js/classie.js" | prepend: site.baseurl }}"></script>
<script src="{{ "../css/2016_style/js/cbpAnimatedHeader.js" | prepend: site.baseurl }}"></script>


<script>
$(function() {

  // SHOW / HIDE BUTTON
  $(window).scroll(function() {
    if ($(this).scrollTop() > 300) {
      $('.back-to-top').addClass('show');
    } else {
      $('.back-to-top').removeClass('show');
    }
  });

  // FAST SCROLL TO TOP (no pause)
  $('.back-to-top').on('click', function(event) {
    event.preventDefault();

    document.documentElement.style.scrollBehavior = 'auto';

    $('html, body').stop(true).animate({
      scrollTop: 0
    }, 300);

    setTimeout(function() {
      document.documentElement.style.scrollBehavior = 'smooth';
    }, 200);
  });

});
</script>

<script>
$(window).scroll(function() {
  var trigger = $('#intro').height();

  if ($(this).scrollTop() > trigger + 60) {
    $('.navbar-default').addClass('navbar-shrink');
  } else {
    $('.navbar-default').removeClass('navbar-shrink');
  }
});
</script>

<script>
$(document).on('click', '.speaker-toggle', function(e) {
  e.stopPropagation();

  var $currentRow = $(this).closest('.speaker-row');

  // Close all others
  $('.speaker-row').not($currentRow).removeClass('active');
  $('.speaker-row').not($currentRow).find('.speaker-toggle').text('View full bio →');

  // Toggle current
  $currentRow.toggleClass('active');

  // Update button text
  if ($currentRow.hasClass('active')) {
    $(this).text('Hide bio ↑');
  } else {
    $(this).text('View full bio →');
  }
});
</script>

<script>
$('a.page-scroll').on('click', function(e) {

    e.preventDefault();

    var target = $(this.hash);

    if (!target.length) return;

    var navHeight = $('.navbar-default').outerHeight();

    $('html, body').stop().animate({
        scrollTop: target.offset().top - navHeight - 15
    }, 900, 'easeInOutExpo');

});
</script>
