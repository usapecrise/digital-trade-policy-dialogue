<section id="register" class="register-section">
  <div class="container">

    <!-- INTRO -->
    <div class="register-intro text-center">
      <h2 class="section-heading">Register</h2>

      <p class="register-lead">
        Join leaders from across the U.S. technology sector to discuss opportunities in trusted
        digital infrastructure, cybersecurity, and AI enablement.
      </p>

      <p class="register-note">
        Please complete the short registration form below. This should take less than one minute.
      </p>
    </div>

    <!-- REGISTRATION CARD -->
    <div class="registration-card">

      <form id="registrationForm" class="registration-form">

        <div class="form-row">

          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input
              id="firstName"
              name="firstName"
              type="text"
              required>
          </div>

          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input
              id="lastName"
              name="lastName"
              type="text"
              required>
          </div>

        </div>

        <div class="form-group">
          <label for="organization">Organization/Affiliation *</label>
          <input
            id="organization"
            name="organization"
            type="text"
            required>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input
            id="email"
            name="email"
            type="email"
            required>
        </div>

        <button type="submit" class="btn btn-primary submit-btn">
          Submit Registration
        </button>

        <p id="registrationMessage" class="registration-message"></p>

      </form>

    </div>

  </div>
</section>
