<section id="speakers" style="background:#f5f7fb; padding:80px 0;">
  <div class="container">

    <!-- TITLE -->
    <div class="text-center">
      <h2 class="section-heading">Speakers</h2>
      <p style="margin-top:10px; color:#6b7c8c;">
        Distinguished leaders from government, industry, and academia shaping the future of digital trade and AI.
      </p>
    </div>

    <!-- LIST -->
    <div class="speaker-list">
      {% for post in site.data.twenty_17.speakers %}

     <div class="speaker-row">
       

        <!-- TEXT ONLY -->
        <div class="speaker-info">
          <h4>{{ post.title }}</h4>

          <!-- ONE-LINER -->
          <p class="speaker-oneliner">
            {{ post.oneliner }}
          </p>

          <!-- FULL BIO -->
          <div class="speaker-full">
            <p>{{ post.bio }}</p>
          </div>

<div class="speaker-toggle"
     onclick="
       const row = this.closest('.speaker-row');
       row.classList.toggle('active');
       this.innerText = row.classList.contains('active') ? 'Hide bio ↑' : 'View full bio →';
     ">
  View full bio →
</div>

      </div>

      {% endfor %}
    </div>

  </div>
</section>
