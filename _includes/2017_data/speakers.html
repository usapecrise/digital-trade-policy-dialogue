<section id="speakers" style="background:#f5f7fb; padding:80px 0;">
  <div class="container">

    <!-- TITLE -->
    <div class="text-center">
      <h2 class="section-heading">Speakers</h2>
    </div>

    <!-- LIST -->
    <div class="speaker-list">
      {% for post in site.data.twenty_17.speakers %}

      <div class="speaker-row" onclick="this.classList.toggle('active')">

        <!-- LEFT: INITIALS -->
        <div class="speaker-avatar">
          {{ post.title | split: ' ' | map: 'first' | join: '' | slice: 0,2 }}
        </div>

        <!-- RIGHT: CONTENT -->
        <div class="speaker-info">
          <h4>{{ post.title }}</h4>
          <p class="speaker-role">{{ post.subtitle }}</p>

          <!-- PREVIEW -->
          <p class="speaker-preview">
            {{ post.bio | truncate: 180 }}
          </p>

          <!-- FULL -->
          <div class="speaker-full">
            <p>{{ post.bio }}</p>
          </div>

          <div class="speaker-toggle">View full bio →</div>
        </div>

      </div>

      {% endfor %}
    </div>

  </div>
</section>
