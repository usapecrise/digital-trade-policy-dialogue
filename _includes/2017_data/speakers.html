<section id="speakers" style="background:#f5f7fb;">
  <div class="container">

    <div class="text-center">
      <h2 class="section-heading">Speakers</h2>
    </div>

    <div class="speaker-grid">
      {% for post in site.data.twenty_17.speakers %}
      
      <div class="speaker-card" onclick="this.classList.toggle('active')">
        
        <img src="../css/2017_style/img/speaker/{{ post.thumbnail }}" alt="">
        
        <div class="speaker-content">
          <h4>{{ post.title }}</h4>
          <p class="speaker-role">{{ post.subtitle }}</p>

          <p class="speaker-preview">
            {{ post.bio | truncate: 140 }}
          </p>

          <div class="speaker-full">
            <p>{{ post.bio }}</p>
          </div>

          <div class="speaker-toggle">Read more</div>
        </div>

      </div>

      {% endfor %}
    </div>

  </div>
</section>
